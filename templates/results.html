<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>LGCC Results</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/><style>:root{--bg:#0b1210;--surface:#0f1c18;--card:rgba(255,255,255,0.06);--card2:rgba(255,255,255,0.08);--text:rgba(255,255,255,0.92);--muted:rgba(255,255,255,0.65);--faint:rgba(255,255,255,0.40);--line:rgba(255,255,255,0.12);--gold:#b89b5e;--gold-dim:rgba(184,155,94,0.20);--green-accent:#6ee7b7;--radius:16px;--serif:"Playfair Display",Georgia,serif;--sans:Inter,system-ui,-apple-system,Arial,sans-serif;}*,*::before,*::after{box-sizing:border-box}html{background:#000}body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}.page-shell{max-width:860px;margin:0 auto;padding:0 20px 60px}.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line);margin-bottom:36px}.brand{display:flex;align-items:center;gap:10px;text-decoration:none}.brand-mark{width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,0.14);background:rgba(255,255,255,0.05);overflow:hidden;display:grid;place-items:center}.brand-mark img{width:110%;height:110%;object-fit:contain}.brand-text{display:flex;flex-direction:column;line-height:1.15}.brand-name{font-family:var(--serif);font-size:14px;font-weight:600;color:var(--text)}.brand-tag{font-size:11px;color:var(--muted)}.back-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:999px;border:1px solid rgba(184,155,94,0.35);background:rgba(184,155,94,0.10);color:var(--gold);font-size:13px;font-weight:600;text-decoration:none}.event-hero{margin-bottom:28px}.eyebrow{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin:0 0 8px}.event-title{font-family:var(--serif);font-size:clamp(26px,5vw,40px);font-weight:700;line-height:1.1;margin:0 0 8px;color:var(--text)}.event-meta{font-size:14px;color:var(--muted)}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px 24px}.summary-card{display:flex;flex-wrap:wrap;gap:16px 32px;margin-bottom:20px}.stat-item{display:flex;flex-direction:column;gap:2px}.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--faint)}.stat-value{font-size:22px;font-weight:700;color:var(--text)}.stat-value.gold{color:var(--gold)}.payout-strip{display:flex;flex-wrap:wrap;gap:8px;padding-top:14px;border-top:1px solid var(--line);margin-top:4px}.payout-pill{padding:5px 12px;border-radius:999px;background:var(--gold-dim);border:1px solid rgba(184,155,94,0.28);font-size:13px;color:var(--text)}.payout-pill strong{color:var(--gold)}.section-card{margin-bottom:20px;padding:0;overflow:hidden}.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--line)}h2{font-family:var(--serif);font-size:18px;font-weight:700;margin:0;color:var(--text)}.pot-badge{font-size:12px;font-weight:700;padding:4px 11px;border-radius:999px;background:var(--gold-dim);border:1px solid rgba(184,155,94,0.30);color:var(--gold)}.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}table{width:100%;border-collapse:collapse;font-size:14px}thead tr{background:rgba(255,255,255,0.04);border-bottom:1px solid var(--line)}th{padding:10px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--faint);text-align:left;white-space:nowrap}td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.06);color:var(--text);vertical-align:middle}tbody tr:last-child td{border-bottom:none}.winner-row td{background:rgba(184,155,94,0.08)}.col-place{color:var(--muted);font-weight:600;white-space:nowrap}.col-name{font-weight:600;min-width:120px}.col-num{text-align:center;white-space:nowrap}.col-bold{font-weight:700;color:var(--green-accent)}.col-payout{font-weight:700;color:var(--gold)}.skin-player-group{border-top:2px solid rgba(255,255,255,0.16)}.skin-player-header td{padding:12px 14px 7px;font-size:14px;font-weight:700;color:var(--text);background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.06)}.skin-player-name{font-weight:700}.skin-detail-row td{padding:8px 14px;color:var(--muted);font-size:14px}.skin-subtotal-row td{padding:9px 14px 12px;border-top:1px solid rgba(255,255,255,0.10);border-bottom:none;background:rgba(184,155,94,0.06)}.skin-subtotal-label{color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase}.skin-subtotal-count{color:var(--faint);font-size:12px;font-weight:600}.skin-subtotal-amt{font-size:15px;font-weight:700;color:var(--gold)}.no-result-msg{padding:18px 22px;color:var(--muted);font-size:14px;margin:0}.rollover-note{padding:10px 22px 16px;font-size:13px;color:var(--muted);font-style:italic;margin:0}.site-footer{text-align:center;padding-top:28px;border-top:1px solid var(--line);font-size:12px;color:var(--faint)}.photo-btn{display:inline-flex;align-items:center;gap:7px;margin-top:14px;padding:9px 18px;border-radius:999px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);color:var(--text);font-size:13px;font-weight:600;text-decoration:none}.photo-btn.disabled{opacity:0.45;cursor:default;pointer-events:none}@media(max-width:540px){.top-bar{flex-direction:column;align-items:flex-start;gap:12px}.card{padding:16px}.section-header{padding:14px 16px}th,td{padding:9px 10px}}</style></head><body><div class="page-shell"><nav class="top-bar"><a class="brand" href="../index.html"><div class="brand-mark"><img src="../assets/logo.png" alt="LGCC" onerror="this.style.display='none'"/></div><div class="brand-text"><span class="brand-name">Lebanon Golf &amp; Country Club</span><span class="brand-tag">Est. 1951</span></div></a><a class="back-btn" href="../index.htm
