    function formatVsTarget(value) {
      if (value === 0) return "E";
      return value > 0 ? `+${value}` : `${value}`;
    }

    function formatMoney(value) {
      if (value == null || value === "") return "";
      return `$${value}`;
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("en-US", {
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    function renderPage(data) {
      document.title = `${data.event_name} | Lebanon Golf & Country Club`;
      document.getElementById("eventTitle").textContent = data.event_name;
      document.getElementById("eventMeta").textContent =

      const winner = data.standings && data.standings.length ? data.standings[0] : null;
      document.getElementById("winnerSummary").textContent = winner
        ? `Winner: ${winner.player_name} — ${formatVsTarget(winner.vs_target)} points (${formatMoney(winner.payout)})`
        : "Results not available.";

      const tbody = document.getElementById("standingsBody");
      tbody.innerHTML = "";

      (data.standings || []).forEach(player => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="sticky-col sticky-col-1">${player.rank ?? ""}</td>
          <td class="sticky-col sticky-col-2">${player.player_name ?? ""}</td>
          <td>${player.target_points_at_start ?? ""}</td>

          <td>${formatVsTarget(player.vs_target ?? 0)}</td>
          <td>${player.new_target_points ?? ""}</td>
          <td class="money">${formatMoney(player.payout)}</td>
        `;
        tbody.appendChild(tr);
      });

      const skinsContent = document.getElementById("skinsContent");

            if (!data.skins || !data.skins.skin_wins || data.skins.skin_wins.length === 0) {
        if (data.skins && data.skins.no_skins_won) {
          skinsContent.textContent = "No skins were won.";
        } else {
          skinsContent.textContent = "No skins results available.";
        }
      } else {
        const ul = document.createElement("ul");
        ul.className = "skins-list";

        data.skins.skin_wins.forEach(item => {

          li.textContent = `${item.winner} — Hole ${item.hole} — Score ${item.score} — ${formatMoney(item.payout)}`;
          ul.appendChild(li);
        });

        skinsContent.appendChild(ul);
      }
